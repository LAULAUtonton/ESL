<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Karaoke Challenge</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    .karaoke-area {
      border: 2px solid #555;
      border-radius: 10px;
      padding: 32px;
      max-width: 480px;
      margin: auto;
      text-align: center;
    }
    .expected { font-size: 1.25rem; margin-bottom: 1em; color: #222; }
    .feedback { margin-top: 1em; font-size: 1.15rem; }
    button {
      font-size: 1.1rem;
      padding: 12px 28px;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="karaoke-area">
    <h2>🎤 Karaoke Challenge</h2>
    <div class="expected" id="challenge-text">
      <!-- The text to say will appear here -->
    </div>
    <button id="start-record">Start Recording 🎤</button>
    <div class="feedback" id="karaoke-result"></div>
  </div>

  <script>
    // 1. Set the target phrase (could be loaded from a DB/array in your full app)
    const expectedText = "Peter Piper picked a peck of pickled peppers"; // Example tongue twister/challenge
    document.getElementById('challenge-text').innerText = expectedText;

    // 2. Voice recognition setup
    let recognition;
    const resultDiv = document.getElementById('karaoke-result');
    const startBtn = document.getElementById('start-record');

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.continuous = false;
      recognition.interimResults = false;

      startBtn.onclick = function() {
        resultDiv.innerHTML = 'Listening... 🎤';
        recognition.start();
        startBtn.disabled = true;
      };

      recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript.trim();
        let feedback = `You said: "<b>${transcript}</b>"<br>`;
        if (transcript.toLowerCase() === expectedText.toLowerCase()) {
          feedback += "<span style='color:green;'>✅ Excellent! You matched the challenge exactly!</span>";
        } else {
          feedback += "<span style='color:red;'>❌ Keep practicing, try to repeat the phrase verbatim.</span>";
        }
        resultDiv.innerHTML = feedback;
        startBtn.disabled = false;
      };

      recognition.onerror = function(event) {
        resultDiv.innerHTML = 'Error: ' + event.error;
        startBtn.disabled = false;
      };

      recognition.onend = function() {
        startBtn.disabled = false;
      };
    } else {
      startBtn.disabled = true;
      resultDiv.innerHTML = "Sorry. Speech Recognition is not supported in your browser.<br> Try Google Chrome.";
    }
  </script>
</body>
</html>
