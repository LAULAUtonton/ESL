<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portal de Juegos: The Pit y Scape Room</title>
  <style>
    body {
      background: #222;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    h1 {
      margin-bottom: 1em;
      font-size: 2.2em;
      letter-spacing: 2px;
    }
    .portals {
      display: flex;
      gap: 3em;
    }
    .portal {
      background: #252525;
      border: 2px solid #444;
      border-radius: 25px;
      padding: 2em 2.5em;
      text-align: center;
      box-shadow: 0 6px 40px #000d 0;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .portal:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 60px #000f 0;
      border-color: #6cf;
    }
    .portal-title {
      margin: 0 0 0.6em 0;
      font-size: 1.6em;
      color: #7df;
      letter-spacing: 1px;
    }
    .portal-btn {
      background: #7df;
      color: #222;
      border: none;
      border-radius: 7px;
      padding: 0.75em 2em;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    .portal-btn:hover {
      background: #3af;
      color: #fff;
    }
    /* BOTÓN DE VOLVER */
    .back-btn {
      background: #7df;
      color: #222;
      border: none;
      border-radius: 7px;
      padding: 0.75em 2em;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 20px;
      margin-top: 20px;
      align-self: flex-start;
      transition: background 0.2s;
    }
    .back-btn:hover {
      background: #3af;
      color: #fff;
    }
    @media (max-width: 700px) {
      .portals {
        flex-direction: column;
        gap: 2em;
      }
      .portal {
        padding: 1.3em 1.5em;
      }
    }
  </style>
</head>
<body>
  <!-- Botón de volver, útil si entraste desde una sección interior -->
  <button class="back-btn" onclick="location.href='index.html'">Back to ESL Portals</button>

  <h1>Portal de Juegos</h1>
  <div class="portals">
    <div class="portal">
      <div class="portal-title">The Pit</div>
      <a href="./stations/index.html">
        <button class="portal-btn">Entrar</button>
      </a>
    </div>
    <div class="portal">
      <div class="portal-title">Scape Room</div>
      <a href="./scape-room/game.html">
        <button class="portal-btn">Entrar</button>
      </a>
    </div>
  </div>
</body>
</html>
