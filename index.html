<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESL Stations</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#0f172a;
  color:white;
}

/* HEADER */
.header{
  padding:12px;
  display:flex;
  justify-content:space-between;
}

.header-stat{
  font-size:14px; /* was 12px */
  color:#cbd5f5;
}

/* MENU TABS */
.tabs{
  display:flex;
  gap:10px;
  padding:10px;
}

.tab{
  padding:14px 24px;
  border-radius:9px;
  font-size:17px; /* bigger */
  font-weight:800;
  color:#94a3b8;
  cursor:pointer;
  transition:.2s;
  border:none;
  background:none;
  flex:1;
  text-align:center;
}

.tab.active{
  background:#2563eb;
  color:white;
}

.tab:hover{
  background:#1e293b;
}

/* MOBILE FIX */
@media(max-width:600px){
  .tabs{
    flex-wrap:nowrap;
    overflow-x:auto;
  }

  .tab{
    white-space:nowrap;
    flex:0 0 auto;
    padding:12px 18px;
    font-size:15px;
  }
}

/* STATION CARDS */
.station{
  background:#1e293b;
  margin:10px;
  padding:14px;
  border-radius:10px;
}

.station-name{
  font-size:16px; /* was 14px */
  font-weight:bold;
}

.station-desc{
  font-size:13px;
  color:#cbd5f5;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-stat">Player: Guest</div>
  <div class="header-stat">Visited: 0</div>
</div>

<div class="tabs">
  <button class="tab active">Stations</button>
  <button class="tab">Leaderboard</button>
  <button class="tab">Achievements</button>
</div>

<div class="station">
  <div class="station-name">Airport Check-in</div>
  <div class="station-desc">Practice basic conversation</div>
</div>

<div class="station">
  <div class="station-name">Restaurant</div>
  <div class="station-desc">Ordering food and drinks</div>
</div>

<div class="station">
  <div class="station-name">Hotel</div>
  <div class="station-desc">Booking and check-in</div>
</div>

</body>
</html>
